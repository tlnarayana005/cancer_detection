project:
  name: cancer_detection_ai
  version: 0.1.0
  seed: 42

data:
  base_dir: data
  train_dir: train
  val_dir: val
  test_dir: test
  image_size: [224, 224]
  batch_size: 16
  validation_split: 0.15
  seed: 42

model:
  backbone: efficientnetb0
  pretrained: true
  input_shape: [224, 224, 3]
  dropout_rate: 0.3
  dense_units: 256
  learning_rate: 1e-4
  num_classes: 2
  activation: softmax

training:
  epochs: 20
  patience: 4
  checkpoint_dir: outputs/checkpoints
  log_dir: outputs/logs
  model_export: outputs/model
  monitor_metric: val_loss
  mode: min

inference:
  class_names:
    - benign
    - malignant
